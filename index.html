<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8" />
  <title>Diagnose Feed</title>
  <style>
    @font-face {
      font-family: 'Futura PT';
      src: url('FuturaCyrillicBook.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: 'Futura PT';
      src: url('FuturaCyrillicDemi.ttf') format('truetype');
      font-weight: 600;
      font-style: normal;
    }

    @font-face {
      font-family: 'Futura PT';
      src: url('FuturaCyrillicHeavy.ttf') format('truetype');
      font-weight: 800;
      font-style: normal;
    }

    body {
      background-color: whitesmoke;
      color: white;
      font-family: 'Futura PT', Arial, Helvetica, sans-serif;
      font-weight: 400;
      font-size: 21pt;
      margin: 0;
      padding: 0;
      overscroll-behavior-y: none;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-weight: 600;
      font-size: 29pt;
    }

    p {
      font-size: 21pt;
    }

    .post {
      margin: 30px auto;
      height: 675px;
      width: 540px;
      background-color: black;
      position: relative;
    }

    .diagnose-tekst {
      font-weight: 800;
      font-size: 55pt;
      color: #e7e3dd;
    }

    .titleFeed {
      color: black;
      text-align: center;
    }

    .like-img-special {
      transition: transform 0.3s;
    }

    .like-img-special:hover {
      transform: scale(1.1);
      filter: drop-shadow(0px 0px 5px rgba(0, 0, 0, 0.3));
    }

    /* Pas hier de achtergrondkleur aan van de beschrijving */
    .description {
      width: 540px;
      margin: 10px auto;
      padding: 10px;
      background-color: whitesmoke;
      /* van #222 naar wit */
      color: black;
      /* zwarte tekst */
      font-size: 18pt;
      cursor: pointer;
      text-align: center;
      transition: transform 0.2s ease;
    }

    .description:hover {
      transform: scale(1.03);
    }

    /* Slideshow stijlen */
    .slideshow-container {
      width: 177mm;
      height: 184mm;
      margin: 30px auto;
      overflow: hidden;
      position: relative;
      background-color: #f5f5f5;
      color: white;
    }

    /* Restart button styling */
    #restartContainer {
      position: fixed;
      top: 50px;
      right: 50px;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      /* stack image and label */
      align-items: center;
      justify-content: center;
      text-align: center;
    }


    #restartBtn {
      width: 50px;
      height: 50px;
      cursor: pointer;
      opacity: 0.3;
      transition: opacity 0.2s;
    }

    /* Ensure the image inside the button inherits the size */
    #restartBtn img {
      width: 100%;
      height: 100%;
      display: block;
    }

    #restartBtn img:hover {
      opacity: 1;
    }




    #restartLabel {
      font-size: 24px;
      color: black;
      margin-top: 8px;
      /* space below the icon */
      text-align: center;
      /* removed absolute positioning */
    }

    #mislabelLogo {
      width: 120px;
      max-width: 120px;
      height: auto;
      opacity: 0.9;
      margin-left: 50px;
      margin-top: 50px;
    }

    .slides-track {
      display: flex;
      width: calc(177mm * 2);
      /* 2 slides van 177mm */
      height: 100%;
      transition: transform 0.3s ease-out;
      cursor: grab;
    }

    .slides-track:active {
      cursor: grabbing;
    }

    .slide {
      width: 177mm;
      height: 100%;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 0;
      box-sizing: border-box;
      position: relative;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      /* Voorkomt dat sleep-actie onbedoeld de afbeelding oppakt */
    }

    #btnGelezenSlideshow {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    .zoom-subtle {
      transition: transform 0.2s ease;
    }

    .zoom-subtle:hover {
      transform: scale(1.03);
    }

    .zoom-strong {
      transition: transform 0.2s ease;
    }

    .zoom-strong:hover {
      transform: scale(1.10);
    }

    a {
      transition: transform 0.2s ease;
      display: inline-block;
    }

    a:hover {
      transform: scale(1.03);
    }
  </style>
</head>

<body>

  <img id="mislabelLogo" src="Logo_Mislabel_web.png"
    style="position:fixed; top:10px; left:10px; width:120px; z-index:2000;">

  <div id="app"></div>

  <div id="meterUI"
    style="position: fixed; left: 30px; top: 50%; transform: translateY(-50%); height: 33vh; width: 100px; display: none; align-items: center; z-index: 1000;">
    <div
      style="writing-mode: vertical-rl; transform: rotate(180deg); margin-right: 15px; font-weight: bold; font-size: 26pt; color: black;">
      diagnostic conviction</div>
    <div
      style="display: flex; flex-direction: column; justify-content: flex-end; width: 40px; height: 100%; border: 2px solid white; background-color: rgba(0,0,0,0.5); position: relative;">
      <div id="meterFill" style="width: 100%; height: 0%; background-color: orange; transition: height 0.5s;"></div>
      <div id="meterLabel"
        style="position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%); font-weight: bold; font-size: 18pt; color: black; white-space: nowrap;">
        doubt</div>
    </div>
  </div>
  <div id="app"></div>
  <div id="restartContainer" style="display:none;">
    <img id="restartBtn" src="./Restart_icon.png" onerror="this.src='https://via.placeholder.com/50?text=Icon'"
      style="width:50px;height:50px;cursor:pointer;opacity:0.3;transition:opacity 0.2s;">

    <div id="restartLabel">Restart</div>


  </div>
  <script>
    const diagnoses = ['Depression', 'ADHD', 'OCD', 'Anxiety', 'Bipolar'];
    // [AANPASSEN: Tekst inhoud] Hier staan de vaste titels/inhoud per diagnose
    // [AANPASSEN: Afbeeldingen per diagnose] Vervang de teksten hieronder met de bestandsnamen van de afbeeldingen die je wilt gebruiken voor de posts. 
    // Zorg dat de afbeeldingen in dezelfde map staan als de code, of gebruik een URL. Je mag er zoveel toevoegen als je wilt.
    const postsData = {
      'Depression': ['Depression_post1.png', 'Depression_post2.png', 'Depression_post3.png', 'Depression_post4.png', 'Depression_post5.png', 'Depression_post6.png'],
      'ADHD': ['ADHD_post1.png', 'ADHD_post2.png', 'ADHD_post3.png', 'ADHD_post4.png', 'ADHD_post5.png', 'ADHD_post6.png'],
      'OCD': ['OCD_post1.png', 'OCD_post2.png', 'OCD_post3.png', 'OCD_post4.png', 'OCD_post5.png', 'OCD_post6.png'],
      'Anxiety': ['Anxiety_post1.png', 'Anxiety_post2.png', 'Anxiety_post3.png', 'Anxiety_post4.png', 'Anxiety_post5.png', 'Anxiety_post6.png'],
      'Bipolar': ['Bipolar_post1.png', 'Bipolar_post2.png', 'Bipolar_post3.png', 'Bipolar_post4.png', 'Bipolar_post5.png', 'Bipolar_post6.png']
    };

    let foundDokter = false;
    let foundDesc = false;
    let foundEarlySpecial = false;
    let foundFocusSpecial = false;

    function getNegativeEventsCount() {
      return (foundDokter ? 1 : 0) + (foundDesc ? 1 : 0) + (foundEarlySpecial ? 1 : 0) + (foundFocusSpecial ? 1 : 0);
    }

    function updateMeter(totalLikesVal = 0, inFocusMode = false) {
      const meterUI = document.getElementById('meterUI');
      if (!meterUI) return;

      const negativeCount = getNegativeEventsCount();

      // Determine label based on total negative count and likes
      let label = '';
      if (totalLikesVal === 0) {
        // No likes given yet -> stay in doubt regardless of negatives
        label = 'doubt';
      } else {
        if (negativeCount <= 2) {
          label = 'certainty';
        } else if (negativeCount === 3) {
          label = 'recognition';
        } else {
          label = 'doubt';
        }
      }

      // Compute fill percentage based on label and likes
      let percent = 0;
      if (label === 'certainty') {
        // Gradual increase: each like adds 30%, max 90% at 3 likes
        percent = Math.min(90, totalLikesVal * 30);
        if (percent === 0) percent = 10; // ensure some visibility when still doubt
      } else if (label === 'recognition') {
        percent = 45; // fixed for recognition
      } else {
        // doubt state
        percent = 10;
      }

      // Apply focus mode boost (adds 10% but caps at 100%)
      if (inFocusMode) {
        percent = Math.min(100, percent + 10);
      }

      document.getElementById('meterFill').style.height = percent + '%';
      document.getElementById('meterLabel').textContent = label;
    }

    function showRestartButton(show) {
      const container = document.getElementById('restartContainer');
      if (container) container.style.display = show ? 'flex' : 'none';
    }
    const restartBtn = document.getElementById('restartBtn');
    if (restartBtn) restartBtn.onclick = () => location.reload();




    // --- INACTIVITY HINT SYSTEM ---
    let hintTimeout = null;
    function clearHint() {
      if (hintTimeout) {
        clearTimeout(hintTimeout);
        hintTimeout = null;
      }
      const existing = document.getElementById('hintPopup');
      if (existing) existing.remove();
    }

    function startHintTimer(text, delayMs = 40000) {
      clearHint();
      hintTimeout = setTimeout(() => {
        const div = document.createElement('div');
        div.id = 'hintPopup';
        div.style.position = 'fixed';
        div.style.top = '50%';
        div.style.left = '50%';
        div.style.transform = 'translate(-50%, -50%)';
        div.style.backgroundColor = 'rgba(0,0,0,0.85)';
        div.style.color = 'white';
        div.style.padding = '15px 30px';
        div.style.borderRadius = '10px';
        div.style.zIndex = '3000';
        div.style.fontSize = '16pt';
        div.style.boxShadow = '0 0 15px rgba(0,0,0,0.5)';
        div.style.display = 'flex';
        div.style.alignItems = 'center';
        div.style.gap = '20px';

        div.innerHTML = `
          <span>${text}</span>
          <div id="closeHintBtn" style="cursor:pointer; font-size: 24pt; font-weight: bold; line-height: 1;">&times;</div>
        `;
        document.body.appendChild(div);

        document.getElementById('closeHintBtn').onclick = () => {
          div.remove();
        };
      }, delayMs);
    }

    const topBannerHTML = (showScrollText, showTitle = true, heroText = "I feel bad\u2026 what is wrong with me?") => `
      <div style="position: fixed; top: 0; left: 0; width: 100%; background-color: whitesmoke; padding-top: 20px; padding-bottom: 20px; z-index: 1000; display: flex; flex-direction: column; align-items: center;">
        <div style="width: 80%; min-height: 480px; display: flex; align-items: center; justify-content: center; background-image: url('Wolkje_gedachten_afbeelding.png'); background-size: contain; background-repeat: no-repeat; background-position: center;">
           <div style="font-size: 36pt; color: black; text-shadow: 1px 1px 2px white; font-weight: bold; text-align: center; padding: 60px 100px; max-width: 900px; box-sizing: border-box;">${heroText}</div>
        </div>
        
        ${showTitle ? `
          <!-- <h1 style="color: black; margin: 20px 0 0 0; font-size: 26pt;">Social media</h1> -->
          <!-- [AANPASSEN: Tekst als Afbeelding] -->
          <img src="Tekst_Socialmedia_feed.png" style="width: 100%; max-width: 400px; margin: 20px 0 0 0;" />
        ` : ''}
        ${showScrollText ? `<div style="font-size: 18pt; color: black; margin-top: 5px;">Scroll down and discover the next posts.</div>` : ''}
      </div>
      <div style="width: 100%; height: ${showScrollText ? '580px' : '560px'};"></div>
    `;

    function sceneFeed(next) {
      // Show restart button in feed scene
      showRestartButton(true);
      clearHint();
      startHintTimer("Like posts to continue.");
      document.getElementById('meterUI').style.display = 'flex';
      updateMeter(0, false);
      const app = document.getElementById('app');
      app.innerHTML = topBannerHTML(true) + `<div id="feed"></div>`;

      let feedPosts = [];
      const maxPosts = 10;
      let likedPosts = {};
      let totalLikes = 0;
      let postIdCounter = 0;
      let focusMode = false;
      let diagnoseLikeCount = {};
      diagnoses.forEach(d => diagnoseLikeCount[d] = 0);
      let lastScroll = window.scrollY || document.documentElement.scrollTop;

      function addRandomPost(diagnose = null, isSpecial = false) {
        const d = diagnose || diagnoses[Math.floor(Math.random() * diagnoses.length)];
        const content = postsData[d][Math.floor(Math.random() * postsData[d].length)];
        const randomLikes = Math.floor(Math.random() * 899) + 100;
        feedPosts.push({ id: postIdCounter++, diagnose: d, content, isSpecial, randomLikes });
      }

      function initFeed() {
        feedPosts = [];
        for (let i = 0; i < maxPosts; i++) addRandomPost();
        if (feedPosts.length > 0) {
          feedPosts[Math.floor(Math.random() * feedPosts.length)].hasDescription = true;
          feedPosts[Math.floor(Math.random() * feedPosts.length)].isEarlySpecial = true;
        }
        updateFeed();
      }

      function buildFocusFeed() {
        clearHint();
        startHintTimer("Scroll all the way down to continue.");
        focusMode = true;
        const app = document.getElementById('app');
        app.innerHTML = topBannerHTML(false, true, "I want to see more. It feels like support and recognition.") + `<div id="feed"></div>`;
        feedPosts = [];
        window.scrollTo({ top: 0, behavior: 'auto' });
        enableScrollTrigger(next);
        let maxLikes = Math.max(...Object.values(diagnoseLikeCount));
        let topDiagnoses = Object.keys(diagnoseLikeCount).filter(d => diagnoseLikeCount[d] === maxLikes);
        const focusDiagnose = topDiagnoses[Math.floor(Math.random() * topDiagnoses.length)];
        const specialIndex = 2;
        for (let i = 0; i < maxPosts; i++) {
          if (i === specialIndex) {
            addRandomPost(focusDiagnose, true);
          } else {
            addRandomPost(focusDiagnose);
          }
        }
        updateFeed();
      }

      function likePost(postId) {
        const post = feedPosts.find(p => p.id === postId);
        if (!post) return;
        if (post.isSpecial) return;
        if (likedPosts[postId]) return;
        likedPosts[postId] = true;
        totalLikes++;
        diagnoseLikeCount[post.diagnose]++;
      }

      function rebuildFeed() {
        feedPosts = [];
        const likedDiagnoses = Object.keys(diagnoseLikeCount).filter(d => diagnoseLikeCount[d] > 0);
        for (let i = 0; i < maxPosts; i++) {
          if (likedDiagnoses.length > 0 && Math.random() < 0.7) {
            const d = likedDiagnoses[Math.floor(Math.random() * likedDiagnoses.length)];
            addRandomPost(d);
          } else {
            addRandomPost();
          }
        }
        if (feedPosts.length > 0) {
          feedPosts[Math.floor(Math.random() * feedPosts.length)].hasDescription = true;
          feedPosts[Math.floor(Math.random() * feedPosts.length)].isEarlySpecial = true;
        }
        updateFeed();
      }

      function updateFeed() {
        const feedDiv = document.getElementById('feed');
        if (!feedDiv) return;
        feedDiv.innerHTML = '';

        feedPosts.forEach((post, index) => {
          const rowContainer = document.createElement('div');
          rowContainer.style.display = 'flex';
          rowContainer.style.justifyContent = 'center';
          rowContainer.style.alignItems = 'flex-end'; // aligns action buttons to bottom of post
          rowContainer.style.margin = '30px auto';

          const leftCol = document.createElement('div');
          leftCol.style.display = 'flex';
          leftCol.style.flexDirection = 'column';

          const div = document.createElement('div');
          div.className = 'post';
          div.style.overflow = 'hidden';
          div.style.border = 'none'; // Geen randje om de foto
          div.style.borderRadius = '15px'; // Moderne Tiktok afrondingen
          div.style.display = 'flex';
          div.style.flexDirection = 'column';
          div.style.justifyContent = 'center';
          div.style.alignItems = 'center';
          div.style.margin = '0'; // force margin to 0 here
          div.innerHTML = `
             <!-- [AANPASSEN] Afbeelding wordt nu per post gekozen uit de postsData lijst -->
             <img src="${post.content}" onerror="this.src='https://via.placeholder.com/540x675?text=Afbeelding+Niet+Gevonden'" style="display: ${(post.isSpecial && likedPosts[post.id]) ? 'none' : 'block'}; position: absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index: 0;">
          `;
          if (post.isSpecial && likedPosts[post.id]) {
            div.style.backgroundColor = 'black';

            // Herbouw de tekst als post al geliket was en feed re-rendert
            const overlayText = document.createElement('div');
            overlayText.style.position = 'absolute';
            overlayText.style.top = '70px';
            overlayText.style.bottom = '110px';
            overlayText.style.left = '20px';
            overlayText.style.right = '20px';
            overlayText.style.backgroundColor = 'transparent';
            overlayText.style.color = 'white';
            overlayText.style.padding = '10px';
            overlayText.style.textAlign = 'center';
            overlayText.style.display = 'flex';
            overlayText.style.flexDirection = 'column';
            overlayText.style.justifyContent = 'center';
            overlayText.innerHTML = `
               <h3 style="margin-bottom: 20px; font-size: 26pt;">The reality behind excessive social media use</h3>
               <p style="font-size: 18pt;">Excessive social media use is associated with concentration problems, lower self-esteem, and feelings of depression.</p>
               <p style="font-size: 18pt; margin-top: 20px;"><strong>Keep scrolling down to continue.</strong></p>
               <p style="font-size: 11pt; margin-top: 40px;">Bron: <a href="https://www-sciencedirect-com.avans.idm.oclc.org/science/article/pii/S0001691825003282" target="_blank" style="color: dodgerblue; text-decoration: underline;">Redirecting. (z.d.-c).</a></p>
             `;
            div.appendChild(overlayText);
          }
          leftCol.appendChild(div);

          // Interactie knoppen (rechts buiten de post)
          const interactCol = document.createElement('div');
          interactCol.style.display = 'flex';
          interactCol.style.flexDirection = 'column';
          interactCol.style.alignItems = 'center';
          interactCol.style.marginLeft = '20px'; // Space from post
          interactCol.style.marginBottom = '20px';

          const likeContainer = document.createElement('div');
          likeContainer.style.width = '100px';
          likeContainer.style.height = '100px';
          likeContainer.style.backgroundColor = 'white'; // Ligther than whitesmoke
          likeContainer.style.borderRadius = '50%';
          likeContainer.style.display = 'flex';
          likeContainer.style.marginBottom = '20px';
          likeContainer.style.justifyContent = 'center';
          likeContainer.style.alignItems = 'center';
          likeContainer.style.boxShadow = '0 4px 10px rgba(0,0,0,0.1)';

          const likeImg = document.createElement('img');
          likeImg.style.width = '80px';
          likeImg.style.height = '80px';
          likeImg.style.cursor = 'pointer';
          likeImg.src = likedPosts[post.id] ? 'Like_button_clicked.png' : 'Like_button.png';

          if (post.isSpecial || post.isEarlySpecial) {
            likeImg.className = 'like-img-special';
          }
          likeContainer.appendChild(likeImg);

          const likesText = document.createElement('div');
          likesText.style.color = 'black';
          likesText.style.fontSize = '21pt';
          likesText.style.fontWeight = 'bold';
          likesText.style.marginBottom = '300px';
          likesText.textContent = (post.randomLikes || 100) + (likedPosts[post.id] ? 1 : 0);

          interactCol.appendChild(likeContainer);
          interactCol.appendChild(likesText);

          if (post.isSpecial) {
            likeImg.style.cursor = 'pointer';
            likeImg.onclick = () => {
              if (!likedPosts[post.id]) {
                likedPosts[post.id] = true;
                likeImg.src = 'Like_button_clicked.png';
                likesText.textContent = (post.randomLikes || 100) + 1;

                if (!foundFocusSpecial) {
                  foundFocusSpecial = true;
                  updateMeter(totalLikes, focusMode);
                }

                // Verberg de afbeelding en maak post zwart
                const imgEl = div.querySelector('img');
                if (imgEl) imgEl.style.display = 'none';
                div.style.backgroundColor = 'black';

                // Tekst laten verschijnen in de post
                const overlayText = document.createElement('div');
                overlayText.style.position = 'absolute';
                overlayText.style.top = '70px';
                overlayText.style.bottom = '110px';
                overlayText.style.left = '20px';
                overlayText.style.right = '20px';
                overlayText.style.backgroundColor = 'transparent';
                overlayText.style.color = 'white';
                overlayText.style.padding = '10px';
                overlayText.style.textAlign = 'center';
                overlayText.style.display = 'flex';
                overlayText.style.flexDirection = 'column';
                overlayText.style.justifyContent = 'center';
                // [AANPASSEN: Tekst & Stijl] Deze text komt tevoorschijn midden op de foto als je op 'Like' klikt bij de speciale post in focus mode
                overlayText.innerHTML = `
                  <!-- <h3 style="margin-bottom: 20px; font-size: 26pt;">The reality behind excessive social media use</h3> -->
                  <!-- [AANPASSEN: Tekst als Afbeelding] Vervang bovenstaande h3 titel evt. door een afbeelding: -->
                  <img src="Tekst_Thereality2.png" style="width: 100%; max-width: 600px; margin: 0 auto -60px auto;">
                  <p style="font-size: 18pt;">Excessive social media use is associated with concentration problems, lower self-esteem, and feelings of depression.</p>
                  <p style="font-size: 18pt; margin-top: 20px;"><strong>Keep scrolling down to continue.</strong></p>
                  <p style="font-size: 11pt; margin-top: 40px;">Bron: <a href="https://www-sciencedirect-com.avans.idm.oclc.org/science/article/pii/S0001691825003282" target="_blank" style="color: dodgerblue; text-decoration: underline;">Redirecting. (z.d.-c).</a></p>
                `;
                div.appendChild(overlayText);

              }
            };
          } else if (post.isEarlySpecial) {
            likeImg.style.cursor = 'pointer';
            likeImg.onclick = () => {
              if (!likedPosts[post.id]) {
                likedPosts[post.id] = true;
                likeImg.src = 'Like_button_clicked.png';
                likesText.textContent = (post.randomLikes || 100) + 1;

                if (!foundEarlySpecial) {
                  foundEarlySpecial = true;
                  updateMeter(totalLikes, focusMode);
                }

                lastScroll = window.scrollY || document.documentElement.scrollTop;
                setTimeout(() => {
                  sceneSlideshow(() => {
                    app.innerHTML = topBannerHTML(!focusMode, true, focusMode ? "I want to see more. It feels like support and recognition." : "I feel bad\u2026 what is wrong with me?") + `<div id="feed"></div>`;
                    updateFeed();
                    setTimeout(() => window.scrollTo({ top: lastScroll, behavior: 'auto' }), 50);
                  });
                }, 200);
              }
            };
          } else {
            if (!focusMode) {
              likeImg.style.cursor = 'pointer';
              likeImg.onclick = () => {
                if (likedPosts[post.id]) return;
                likedPosts[post.id] = true;
                totalLikes++;
                diagnoseLikeCount[post.diagnose]++;
                likeImg.src = 'Like_button_clicked.png';
                likesText.textContent = (post.randomLikes || 100) + 1;

                updateMeter(totalLikes, focusMode);

                setTimeout(() => {
                  if (totalLikes < 3) rebuildFeed();
                  else buildFocusFeed();
                }, 100);
              };
            }
          }

          rowContainer.appendChild(leftCol);
          rowContainer.appendChild(interactCol);
          feedDiv.appendChild(rowContainer);

          // Beschrijving
          if (post.hasDescription) {
            const descDiv = document.createElement('div');
            descDiv.className = 'description';
            // [AANPASSEN: Tekst] De tekst van de doorklik-balk onder willekeurige berichten
            descDiv.innerHTML = 'Exposure to content about self-harm or suicide… <span style="font-weight: bold;">read more</span>';
            descDiv.onclick = () => {
              if (!foundDesc) {
                foundDesc = true;
                updateMeter(totalLikes, focusMode);
